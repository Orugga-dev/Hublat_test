<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Hublat | Leadership</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" crossorigin href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#17b0cf",
            "background-light": "#f6f8f8",
            "background-dark": "#111e21",
            "card-dark": "#1a2c30",
            "text-subtle": "#94aeb5",
          },
          fontFamily: {
            sans: ["Manrope", "sans-serif"],
            serif: ["Playfair Display", "serif"],
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/inner-hero.css" />
  <style>
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111e21; }
    ::-webkit-scrollbar-thumb { background: #244147; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #17b0cf; }
    html { scroll-behavior: smooth; }
  /* Leadership: subtle permanent motion + hover polish */
@keyframes leadershipGridMove {
  0% { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-40px, 30px, 0); }
}
.leadership-grid{
  background-image:
    radial-gradient(circle at 1px 1px, rgba(23,176,207,0.45) 1px, rgba(23,176,207,0.0) 2px);
  background-size: 28px 28px;
  animation: leadershipGridMove 22s linear infinite;
  mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.0) 75%);
  -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.0) 75%);
}
@keyframes leadershipFloat {
  0% { transform: translate3d(0,0,0); }
  50% { transform: translate3d(-16px, 12px, 0); }
  100% { transform: translate3d(0,0,0); }
}
.leadership-float{ animation: leadershipFloat 12s ease-in-out infinite; }

@keyframes statsSheen {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}
.leadership-sheen{
  background: linear-gradient(110deg, rgba(23,176,207,0.0), rgba(23,176,207,0.22), rgba(23,176,207,0.0));
  background-size: 200% 100%;
  animation: statsSheen 6s linear infinite;
}

/* reveal animation */
.leader-card.is-visible{
  opacity: 1 !important;
  transform: translateY(0) !important;
  transition: opacity 700ms ease, transform 700ms ease;
}

</style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-sans antialiased overflow-x-hidden transition-colors duration-300">
  <div data-include="header" data-lang="en"></div>

  
<main class="pt-24">
  <section class="inner-hero min-h-[360px] md:min-h-[420px] flex items-center">
    <div class="inner-hero-media inner-hero-kenburns" style="--hero-url:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d?q=80&w=2400&auto=format&fit=crop'); --hero-opacity:0.36; --hero-blur:7px;" aria-hidden="true"></div>
    <div class="inner-hero-vignette" aria-hidden="true"></div>
    <div class="inner-hero-accent" aria-hidden="true"></div>
    <div class="inner-hero-grain" aria-hidden="true"></div>

    <div class="relative max-w-7xl mx-auto px-6 py-20">
      <h1 class="font-serif text-4xl md:text-5xl font-bold text-slate-900 dark:text-white mb-6">Leadership</h1>
      <p class="text-slate-600 dark:text-text-subtle text-lg max-w-3xl mb-12">
        Hublat is led by four senior partners with regional responsibilities across multiple Ibero‑America markets.
      </p>
    </div>
  </section>

</main>


  <div data-include="footer" data-lang="en"></div>
  <script src="../assets/js/includes.js"></script>
<script>
  (function () {
    function initLeadershipReveal() {
      var section = document.getElementById("leadership");
      if (!section) return;

      var cards = Array.prototype.slice.call(section.querySelectorAll(".leader-card"));
      if (!cards.length) return;

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            cards.forEach(function (card, i) {
              setTimeout(function () { card.classList.add("is-visible"); }, i * 90);
            });
            observer.disconnect();
          }
        });
      }, { threshold: 0.2 });

      observer.observe(section);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initLeadershipReveal);
    } else {
      initLeadershipReveal();
    }
  })();
</script>
</body>
</html>
